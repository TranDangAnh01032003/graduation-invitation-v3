<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GiftForQuynh</title>
  <meta name="description" content="Nội dung món quà riêng dành cho Phạm Như Quỳnh." />
  <link rel="icon" href="assets/ueb-logo-transparent.webp" type="image/webp" />
  <link rel="preload" as="image" href="assets/bg-silk.webp" type="image/webp" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Great+Vibes&family=Oswald:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&family=Roboto+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    if (localStorage.getItem("graduation-theme") === "dark") {
      document.documentElement.classList.add("dark-mode");
    }
  </script>
</head>
<body data-page="gift-for-quynh" class="gift-gate-body">
  <main class="gift-gate-shell">
    <section class="gift-gate-card gift-for-quynh-card" aria-live="polite">
      <img src="assets/ueb-logo-transparent.webp" alt="UEB" class="gift-gate-logo">
      <p class="gift-gate-kicker" id="giftForQuynhStatus">Đang kiểm tra quyền truy cập</p>
      <h1 class="gift-script-name">Như Quỳnh</h1>
      <div id="giftForQuynhContent" class="gift-for-quynh-content hidden">
        <p>GiftForQuynh</p>
        <span>Nội dung món quà sẽ được đặt ở đây.</span>
      </div>
      <p id="giftForQuynhDenied" class="gift-gate-text">
        Trang này chỉ hiển thị khi tài khoản có đủ quyền và món quà đã đến thời điểm được mở.
      </p>
      <div class="gift-gate-actions">
        <a href="index.html">Quay lại thiệp mời</a>
        <a href="admin.html">Về trang admin</a>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="script.js"></script>
</body>
</html>
